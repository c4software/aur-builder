services:
  aur_builder:
    build: ./builder
    # Nécessaire pour que makechrootpkg puisse monter l'overlayfs du chroot
    privileged: true
    volumes:
      - ./packages.conf:/etc/aur-packages:ro
      - ./gpg-keys:/root/.gnupg
      - ./chroot:/chroot
      - ./repo:/repo
    restart: unless-stopped

  aur_server:
    image: nginx:alpine
    volumes:
      - ./repo:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "9080:80"
    restart: unless-stopped
